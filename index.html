<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Câmbio USD → EUR · Wise</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>💱 Câmbio USD → EUR</h1>
  <p>Análise de conversão Wise com dados BCE em tempo real</p>
</header>

<main>

  <!-- ── Formulário ── -->
  <section class="card">
    <div class="form-row">
      <div class="form-group">
        <label for="montante">Montante (USD)</label>
        <input type="number" id="montante" value="6600" min="100" step="100">
      </div>
      <div class="form-group">
        <label for="flexibilidade">Posso esperar (dias)</label>
        <input type="number" id="flexibilidade" value="15" min="1" max="30">
      </div>
      <button id="btn-analisar" onclick="analisar()">Analisar →</button>
      <button class="btn-secundario" onclick="mostrarArquivo()">📋 Histórico</button>
      <button class="btn-secundario" onclick="configurarAlerta()">🔔 Alerta</button>
      <button class="btn-secundario btn-converti" onclick="registarTransferencia()">📤 Converti</button>
      <button class="btn-secundario" onclick="mostrarComparacoes()">⚖️ Comparar</button>
    </div>
    <div class="status-row">
      <div id="status-dados" class="status-dados">A carregar dados…</div>
      <span id="acuidade-badge" class="acuidade-badge cinza" style="display:none"></span>
    </div>
  </section>

  <!-- ── Relatório ── -->
  <div id="relatorio" style="display:none">

    <nav id="nav-relatorio">
      <a href="#decisao">Decisão</a>
      <a href="#contexto">Contexto</a>
      <a href="#numeros">Números</a>
    </nav>

    <section id="decisao"  class="card"></section>
    <section id="contexto" class="card"></section>
    <section id="numeros"  class="card"></section>

  </div>

</main>

<footer>
  <p>
    Taxas BCE via <a href="https://frankfurter.dev" target="_blank">Frankfurter</a> ·
    Fees e taxa real <a href="https://wise.com" target="_blank">Wise</a> ·
    Actualizado em <span id="ultima-actualizacao">—</span>
  </p>
</footer>

<script src="js/analise.js?v=7"></script>
<script src="js/relatorio.js?v=8"></script>
<script>
  carregarDados().then(() => analisar());
</script>

</body>
</html>
